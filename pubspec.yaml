name: proyecto_qpon
description: "Qpon - Flutter app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.9.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^2.15.0
  firebase_auth: ^4.2.0
  google_sign_in: ^6.1.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  table_calendar: ^3.0.9
  flutter_map_location_marker: ^10.1.0
  geolocator: ^14.0.2
  http: ^1.6.0
  location: ^8.0.1
  flutter_polyline_points: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"
  flutter_lints: ^5.0.0

flutter_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_foreground: "assets/icon/icon.png"
  adaptive_icon_background: "#00000000"
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/